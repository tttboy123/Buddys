services:
  - type: web
    name: buddys-console
    env: python
    plan: starter
    buildCommand: pip install .
    startCommand: PYTHONPATH=src uvicorn buddys_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BUDDYS_DEFAULT_OPENAI_API_KEY
        sync: false
      - key: BUDDYS_DEFAULT_TOKEN_PLAN_KEY
        sync: false
      - key: BUDDYS_DEFAULT_MODEL
        value: MiniMax-M3
